services:
  # ─── MySQL Database ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: 7bar_mysql
    restart: unless-stopped
    command: --innodb-redo-log-capacity=536870912
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-7bar@2025}
      MYSQL_DATABASE: 7bar
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./mysql/products-seed.sql:/docker-entrypoint-initdb.d/02b-products.sql:ro
      - ./mysql/fix-urls.sql:/docker-entrypoint-initdb.d/03-fix-urls.sql:ro
    networks:
      - 7bar_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-7bar@2025}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 7bar_backend
    restart: unless-stopped
    ports:
      - "3520:3520"
    environment:
      PORT: 3520
      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID}
      GOOGLE_DRIVE_CLIENT_SECRET: ${GOOGLE_DRIVE_CLIENT_SECRET}
      GOOGLE_DRIVE_REFRESH_TOKEN: ${GOOGLE_DRIVE_REFRESH_TOKEN}
      DATABASE_URL_HEART: mysql://root:7bar%402025@mysql:3306/heart
      DATABASE_URL_TENANT: mysql://root:7bar%402025@mysql:3306/7bar
      JWT_SECRET: ${JWT_SECRET:-7bar_jwt_super_secret_2025}
      SETUP_PIN: ${SETUP_PIN:-teltech352}
      NFCE_SERVICE_URL: http://nfce-service:80
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      TZ: America/Sao_Paulo
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-credentials.json
    volumes:
      - uploads_data:/app/uploads
      - ./backups:/app/backups
      - ./backend/google-credentials.json:/app/google-credentials.json:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - 7bar_network

  # ─── Frontend (Vite/React PWA) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: 7bar_frontend
    restart: unless-stopped
    ports:
      - "3521:3521"
    environment:
      PORT: 3521
    depends_on:
      - backend
    volumes:
      - uploads_data:/usr/share/nginx/html/uploads:ro
    networks:
      - 7bar_network

  # ─── NFC-e PHP Microsserviço ───────────────────────────────────────────────
  # Responsável pela comunicação com a SEFAZ-SP
  # Stateless: recebe JSON do NestJS, assina com cert A1, retorna resultado
  nfce-service:
    build:
      context: ./nfce-service
      dockerfile: Dockerfile
    container_name: 7bar_nfce
    restart: unless-stopped
    # Não expõe porta externa — comunicação interna apenas
    ports:
      - "3522:80"
    networks:
      - 7bar_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Integrações (Microserviço Separado) ───────────────────────────────────
  integrations-hub:
    build:
      context: ./integrations-hub
      dockerfile: Dockerfile
    container_name: 7bar_integrations
    restart: unless-stopped
    environment:
      DATABASE_URL_HEART: mysql://root:7bar%402025@mysql:3306/heart
      DATABASE_URL_TENANT: mysql://root:7bar%402025@mysql:3306/7bar
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - 7bar_network

volumes:
  mysql_data:
    name: 7bar_mysql_data
  uploads_data:
    name: 7bar_uploads_data

networks:
  7bar_network:
    name: 7bar_network
    driver: bridge
