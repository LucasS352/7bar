services:
  # ─── MySQL Database ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: 7bar_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-7bar@2025}
      MYSQL_DATABASE: 7bar
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - 7bar_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-7bar@2025}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 7bar_backend
    restart: unless-stopped
    ports:
      - "3520:3520"
    environment:
      PORT: 3520
      DATABASE_URL_HEART: mysql://root:7bar%402025@mysql:3306/heart
      DATABASE_URL_TENANT: mysql://root:7bar%402025@mysql:3306/7bar
      JWT_SECRET: ${JWT_SECRET:-7bar_jwt_super_secret_2025}
      SETUP_PIN: ${SETUP_PIN:-teltech352}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - 7bar_network

  # ─── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${SERVER_IP:-179.127.59.225}:3520
    container_name: 7bar_frontend
    restart: unless-stopped
    ports:
      - "3521:3521"
    environment:
      PORT: 3521
      NEXT_PUBLIC_API_URL: http://${SERVER_IP:-179.127.59.225}:3520
    depends_on:
      - backend
    networks:
      - 7bar_network

volumes:
  mysql_data:
    name: 7bar_mysql_data

networks:
  7bar_network:
    name: 7bar_network
    driver: bridge
