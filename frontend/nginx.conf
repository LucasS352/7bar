server {
    listen 3521;
    server_name _;

    # Permite uploads de até 10MB (logos, imagens, etc)
    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/ → backend (prioridade máxima com ^~)
    location ^~ /api/ {
        proxy_pass http://backend:3520;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Buffer adequado para respostas grandes (imagens, uploads)
        proxy_buffer_size       32k;
        proxy_buffers           16 64k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 0;
    }

    # Servir /uploads/ estaticamente pelo NGINX (bypassa Node.js)
    location ^~ /uploads/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache para assets estáticos do Vite (js, css, fontes — em /assets/)
    location ^~ /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # sys-init — NUNCA cachear (página admin, bypassa Service Worker)
    location = /sys-init {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri /index.html;
    }

    # SPA fallback — todas as rotas retornam index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
