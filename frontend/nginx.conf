server {
    listen 3521;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/ → backend (prioridade máxima com ^~)
    location ^~ /api/ {
        proxy_pass http://backend:3520;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy /uploads/ → backend (prioridade máxima com ^~)
    location ^~ /uploads/ {
        proxy_pass http://backend:3520/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Cache para assets estáticos do Vite (js, css, fontes — em /assets/)
    location ^~ /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — todas as rotas retornam index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

